<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Elicitation - Chip Method</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .setup-section {
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9ff;
            border-radius: 15px;
            border-left: 5px solid #4facfe;
        }

        .setup-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e6ed;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .elicitation-area {
            display: none;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .question-display {
            background: #fff8e1;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #ffc107;
        }

        .question-display h3 {
            color: #f57c00;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .bins-container {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .bin {
            background: white;
            border: 3px solid #e0e6ed;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bin:hover {
            border-color: #4facfe;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.2);
        }

        .bin-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .chips-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            min-height: 60px;
            align-items: center;
        }

        .chip {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            box-shadow: 0 2px 8px rgba(238, 90, 82, 0.3);
            animation: chipPop 0.3s ease-out;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip:hover {
            transform: scale(1.1);
        }

        @keyframes chipPop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .bin-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .chip-count {
            font-size: 1.2em;
            font-weight: bold;
            color: #4facfe;
            min-width: 30px;
        }

        .control-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            background: #4facfe;
            color: white;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #3d8bfe;
            transform: scale(1.1);
        }

        .control-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .chips-remaining {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .chips-remaining h3 {
            color: #ad1457;
            margin-bottom: 10px;
        }

        .remaining-count {
            font-size: 2.5em;
            font-weight: bold;
            color: #ad1457;
        }

        .probability-display {
            background: #e8f5e8;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #4caf50;
        }

        .probability-display h3 {
            color: #2e7d32;
            margin-bottom: 15px;
        }

        .prob-grid {
            display: grid;
            gap: 15px;
        }

        .prob-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .prob-bar {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 15px;
        }

        .prob-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #81c784);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .results-section {
            background: #f3e5f5;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border-left: 5px solid #9c27b0;
        }

        .results-section h3 {
            color: #6a1b9a;
            margin-bottom: 15px;
        }

        .reset-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            margin-left: 15px;
        }

        .reset-btn:hover {
            box-shadow: 0 8px 25px rgba(238, 90, 82, 0.4);
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .bin-controls {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Expert Elicitation</h1>
            <p>Chip Method for Probability Distribution Assessment</p>
        </div>

        <div class="main-content">
            <div class="setup-section" id="setupSection">
                <h2>Setup Your Elicitation</h2>
                
                <div class="form-group">
                    <label for="question">Question/Variable to Assess:</label>
                    <textarea id="question" rows="3" placeholder="e.g., What will be the global temperature increase by 2050?"></textarea>
                </div>

                <div class="form-group">
                    <label for="totalChips">Total Number of Chips:</label>
                    <input type="number" id="totalChips" value="20" min="10" max="100">
                </div>

                <div class="form-group">
                    <label for="bins">Define Outcome Bins (one per line):</label>
                    <textarea id="bins" rows="6" placeholder="< 1°C&#10;1-1.5°C&#10;1.5-2°C&#10;2-2.5°C&#10;2.5-3°C&#10;> 3°C"></textarea>
                </div>

                <button class="btn" onclick="startElicitation()">Start Elicitation</button>
            </div>

            <div class="elicitation-area" id="elicitationArea">
                <div class="question-display">
                    <h3>Assessment Question</h3>
                    <p id="displayQuestion"></p>
                </div>

                <div class="chips-remaining">
                    <h3>Chips Remaining</h3>
                    <div class="remaining-count" id="remainingCount">20</div>
                    <p>Allocate these chips across the outcome bins based on your assessment of their probability</p>
                </div>

                <div class="bins-container" id="binsContainer">
                    <!-- Bins will be generated here -->
                </div>

                <div class="probability-display">
                    <h3>Current Probability Distribution</h3>
                    <div class="prob-grid" id="probGrid">
                        <!-- Probability bars will be generated here -->
                    </div>
                </div>

                <div class="results-section">
                    <h3>Actions</h3>
                    <button class="btn" onclick="exportResults()">Export Results</button>
                    <button class="btn reset-btn" onclick="resetElicitation()">Reset All Chips</button>
                    <button class="btn" onclick="newElicitation()" style="background: linear-gradient(135deg, #9c27b0, #673ab7);">New Elicitation</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let totalChips = 20;
        let remainingChips = 20;
        let bins = [];
        let chipAllocations = {};

        function startElicitation() {
            const question = document.getElementById('question').value.trim();
            const chipsInput = document.getElementById('totalChips').value;
            const binsInput = document.getElementById('bins').value.trim();

            if (!question) {
                alert('Please enter a question to assess.');
                return;
            }

            if (!binsInput) {
                alert('Please define outcome bins.');
                return;
            }

            totalChips = parseInt(chipsInput);
            remainingChips = totalChips;
            bins = binsInput.split('\n').filter(bin => bin.trim() !== '').map(bin => bin.trim());
            
            if (bins.length < 2) {
                alert('Please define at least 2 outcome bins.');
                return;
            }

            // Initialize chip allocations
            chipAllocations = {};
            bins.forEach(bin => {
                chipAllocations[bin] = 0;
            });

            // Display the elicitation interface
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('elicitationArea').style.display = 'block';
            document.getElementById('displayQuestion').textContent = question;
            document.getElementById('remainingCount').textContent = remainingChips;

            generateBins();
            updateProbabilityDisplay();
        }

        function generateBins() {
            const container = document.getElementById('binsContainer');
            container.innerHTML = '';
            
            // Make grid responsive based on number of bins
            const columns = bins.length <= 2 ? bins.length : bins.length <= 4 ? 2 : 3;
            container.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

            bins.forEach(bin => {
                const binElement = document.createElement('div');
                binElement.className = 'bin';
                binElement.innerHTML = `
                    <div class="bin-header">${bin}</div>
                    <div class="chips-display" id="chips-${bin}"></div>
                    <div class="bin-controls">
                        <button class="control-btn" onclick="removeChip('${bin}')" id="remove-${bin}">−</button>
                        <div class="chip-count" id="count-${bin}">0</div>
                        <button class="control-btn" onclick="addChip('${bin}')" id="add-${bin}">+</button>
                    </div>
                `;
                container.appendChild(binElement);
            });

            updateControls();
        }

        function addChip(bin) {
            if (remainingChips > 0) {
                chipAllocations[bin]++;
                remainingChips--;
                updateDisplay(bin);
                updateControls();
                updateProbabilityDisplay();
            }
        }

        function removeChip(bin) {
            if (chipAllocations[bin] > 0) {
                chipAllocations[bin]--;
                remainingChips++;
                updateDisplay(bin);
                updateControls();
                updateProbabilityDisplay();
            }
        }

        function updateDisplay(bin) {
            const chipsDisplay = document.getElementById(`chips-${bin}`);
            const countDisplay = document.getElementById(`count-${bin}`);
            const remainingDisplay = document.getElementById('remainingCount');

            // Update chip count
            countDisplay.textContent = chipAllocations[bin];
            remainingDisplay.textContent = remainingChips;

            // Update visual chips
            chipsDisplay.innerHTML = '';
            for (let i = 0; i < chipAllocations[bin]; i++) {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.onclick = () => removeChip(bin);
                chipsDisplay.appendChild(chip);
            }
        }

        function updateControls() {
            bins.forEach(bin => {
                const addBtn = document.getElementById(`add-${bin}`);
                const removeBtn = document.getElementById(`remove-${bin}`);
                
                addBtn.disabled = remainingChips === 0;
                removeBtn.disabled = chipAllocations[bin] === 0;
            });
        }

        function updateProbabilityDisplay() {
            const probGrid = document.getElementById('probGrid');
            probGrid.innerHTML = '';

            bins.forEach(bin => {
                const probability = chipAllocations[bin] / totalChips;
                const percentage = (probability * 100).toFixed(1);

                const probItem = document.createElement('div');
                probItem.className = 'prob-item';
                probItem.innerHTML = `
                    <span><strong>${bin}</strong></span>
                    <div class="prob-bar">
                        <div class="prob-fill" style="width: ${percentage}%"></div>
                    </div>
                    <span><strong>${percentage}%</strong></span>
                `;
                probGrid.appendChild(probItem);
            });
        }

        function resetElicitation() {
            if (confirm('Are you sure you want to reset all chip allocations?')) {
                bins.forEach(bin => {
                    chipAllocations[bin] = 0;
                    updateDisplay(bin);
                });
                remainingChips = totalChips;
                document.getElementById('remainingCount').textContent = remainingChips;
                updateControls();
                updateProbabilityDisplay();
            }
        }

        function exportResults() {
            const question = document.getElementById('displayQuestion').textContent;
            const results = {
                question: question,
                totalChips: totalChips,
                allocations: chipAllocations,
                probabilities: {}
            };

            bins.forEach(bin => {
                results.probabilities[bin] = (chipAllocations[bin] / totalChips).toFixed(4);
            });

            const resultsText = `Expert Elicitation Results - Chip Method
            
Question: ${question}
Total Chips Used: ${totalChips}
Date: ${new Date().toLocaleDateString()}

Probability Distribution:
${bins.map(bin => `${bin}: ${chipAllocations[bin]} chips (${(chipAllocations[bin] / totalChips * 100).toFixed(1)}%)`).join('\n')}

Raw Data:
${JSON.stringify(results, null, 2)}`;

            // Create downloadable file
            const blob = new Blob([resultsText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `elicitation_results_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function newElicitation() {
            if (confirm('Start a new elicitation? This will clear current progress.')) {
                document.getElementById('setupSection').style.display = 'block';
                document.getElementById('elicitationArea').style.display = 'none';
                
                // Reset form
                document.getElementById('question').value = '';
                document.getElementById('totalChips').value = '20';
                document.getElementById('bins').value = '';
            }
        }
    </script>
</body>
</html>
